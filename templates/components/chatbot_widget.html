<!-- CHATBOT WIDGET SINTA -->
<div id="sinta-widget" style="position:fixed;bottom:24px;right:24px;z-index:9999;font-family:'Inter',sans-serif">

  <!-- BUBBLE TOGGLE -->
  <button id="sinta-toggle"
          onclick="toggleSinta()"
          style="width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
                 background:linear-gradient(135deg,#667eea,#764ba2);
                 box-shadow:0 4px 20px rgba(102,126,234,0.4);
                 display:flex;align-items:center;justify-content:center;
                 transition:all .2s;position:relative">
    <i class="bi bi-chat-dots-fill text-white" style="font-size:22px" id="sinta-icon-open"></i>
    <i class="bi bi-x-lg text-white" style="font-size:18px;display:none" id="sinta-icon-close"></i>
    <!-- Badge notifikasi -->
    <div id="sinta-badge"
         style="position:absolute;top:-2px;right:-2px;width:18px;height:18px;
                background:#ef4444;border-radius:50%;font-size:10px;font-weight:700;
                color:white;display:flex;align-items:center;justify-content:center;
                display:none">1</div>
  </button>

  <!-- CHAT WINDOW -->
  <div id="sinta-window"
       style="display:none;position:absolute;bottom:70px;right:0;
              width:360px;height:500px;
              background:white;border-radius:16px;
              box-shadow:0 8px 40px rgba(0,0,0,0.15);
              display:none;flex-direction:column;overflow:hidden">

    <!-- HEADER -->
    <div style="background:linear-gradient(135deg,#667eea,#764ba2);padding:14px 16px;
                display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);
                  display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="bi bi-robot text-white" style="font-size:16px"></i>
      </div>
      <div style="flex:1">
        <div style="font-size:.9rem;font-weight:600;color:white">SINTA</div>
        <div style="font-size:.75rem;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:4px">
          <div style="width:6px;height:6px;border-radius:50%;background:#4ade80"></div>
          Online 24 jam
        </div>
      </div>
      <button onclick="toggleSinta()"
              style="border:none;background:rgba(255,255,255,0.2);color:white;
                     border-radius:8px;width:28px;height:28px;cursor:pointer;
                     display:flex;align-items:center;justify-content:center">
        <i class="bi bi-x" style="font-size:14px"></i>
      </button>
    </div>

    <!-- PESAN AREA -->
    <div id="sinta-messages"
         style="flex:1;overflow-y:auto;padding:14px;
                display:flex;flex-direction:column;gap:10px;background:#f8f9ff">
      <!-- Pesan sambutan akan dimuat via JS -->
    </div>

    <!-- QUICK QUESTIONS -->
    <div id="sinta-quick" style="padding:8px 12px;background:white;border-top:1px solid #f1f5f9;
                                  display:flex;gap:6px;overflow-x:auto;flex-shrink:0">
      <button onclick="kirimCepat('Apa saja jalur masuk UNISAN?')"
              class="sinta-quick-btn">Jalur masuk</button>
      <button onclick="kirimCepat('Berapa biaya pendaftaran?')"
              class="sinta-quick-btn">Biaya daftar</button>
      <button onclick="kirimCepat('Kapan jadwal seleksi?')"
              class="sinta-quick-btn">Jadwal seleksi</button>
      <button onclick="kirimCepat('Ada prodi apa saja?')"
              class="sinta-quick-btn">Program studi</button>
    </div>

    <!-- INPUT AREA -->
    <div style="padding:10px 12px;background:white;border-top:1px solid #f1f5f9;
                display:flex;gap:8px;align-items:center;flex-shrink:0">
      <input type="text" id="sinta-input"
             placeholder="Ketik pertanyaan..."
             onkeypress="if(event.key==='Enter')kirimPesan()"
             style="flex:1;border:1.5px solid #e2e8f0;border-radius:20px;
                    padding:8px 14px;font-size:.85rem;outline:none;
                    font-family:'Inter',sans-serif">
      <button onclick="kirimPesan()"
              id="sinta-send"
              style="width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
                     background:linear-gradient(135deg,#667eea,#764ba2);
                     display:flex;align-items:center;justify-content:center">
        <i class="bi bi-send-fill text-white" style="font-size:13px"></i>
      </button>
    </div>

  </div>
</div>

<style>
.sinta-quick-btn {
  white-space:nowrap;padding:4px 10px;border-radius:12px;
  border:1px solid #e2e8f0;background:white;font-size:.75rem;
  color:#667eea;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;
}
.sinta-quick-btn:hover { background:#ede9fe;border-color:#667eea; }
.sinta-msg-user {
  align-self:flex-end;background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;padding:8px 12px;border-radius:12px 12px 2px 12px;
  max-width:80%;font-size:.85rem;line-height:1.5;word-break:break-word;
}
.sinta-msg-bot {
  align-self:flex-start;background:white;color:#1e1e2e;
  padding:8px 12px;border-radius:12px 12px 12px 2px;
  max-width:85%;font-size:.85rem;line-height:1.6;word-break:break-word;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sinta-typing {
  align-self:flex-start;background:white;padding:10px 14px;
  border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
#sinta-messages::-webkit-scrollbar { width:4px; }
#sinta-messages::-webkit-scrollbar-thumb { background:#c4c4c4;border-radius:2px; }
</style>

<script>
const SINTA_API   = "{% url 'chatbot:kirim' %}";
const SINTA_SAMBUTAN = "Halo! Saya **SINTA**, asisten virtual PMB UNISAN 👋\n\nAda yang bisa saya bantu seputar pendaftaran mahasiswa baru?";

let sintaSessionId = localStorage.getItem('sinta_session') || '';
let sintaOpen      = false;
let sudahSambutan  = false;

function toggleSinta() {
  sintaOpen = !sintaOpen;
  const win  = document.getElementById('sinta-window');
  const ico1 = document.getElementById('sinta-icon-open');
  const ico2 = document.getElementById('sinta-icon-close');

  win.style.display  = sintaOpen ? 'flex' : 'none';
  ico1.style.display = sintaOpen ? 'none' : 'flex';
  ico2.style.display = sintaOpen ? 'flex' : 'none';

  if (sintaOpen && !sudahSambutan) {
    tambahPesan('bot', SINTA_SAMBUTAN);
    sudahSambutan = true;
  }
  if (sintaOpen) {
    document.getElementById('sinta-input').focus();
  }
}

function tambahPesan(pengirim, teks) {
  const div = document.createElement('div');
  div.className = pengirim === 'user' ? 'sinta-msg-user' : 'sinta-msg-bot';
  div.innerHTML = teks.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('sinta-messages').appendChild(div);
  scrollBottom();
}

function tampilTyping() {
  const div = document.createElement('div');
  div.className = 'sinta-typing';
  div.id = 'sinta-typing';
  div.innerHTML = '<span style="display:flex;gap:4px;align-items:center">'
    + '<div style="width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bounce .6s infinite alternate"></div>'
    + '<div style="width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bounce .6s .2s infinite alternate"></div>'
    + '<div style="width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bounce .6s .4s infinite alternate"></div>'
    + '</span>';
  document.getElementById('sinta-messages').appendChild(div);
  scrollBottom();
}

function hapusTyping() {
  const t = document.getElementById('sinta-typing');
  if (t) t.remove();
}

function scrollBottom() {
  const msg = document.getElementById('sinta-messages');
  msg.scrollTop = msg.scrollHeight;
}

async function kirimPesan() {
  const input = document.getElementById('sinta-input');
  const pesan = input.value.trim();
  if (!pesan) return;

  input.value = '';
  tambahPesan('user', pesan);
  tampilTyping();

  // Sembunyikan quick buttons setelah pertanyaan pertama
  document.getElementById('sinta-quick').style.display = 'none';

  try {
    const resp = await fetch(SINTA_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
      },
      body: JSON.stringify({
        pesan:      pesan,
        session_id: sintaSessionId,
      })
    });
    const data = await resp.json();
    hapusTyping();

    if (data.jawaban) {
      tambahPesan('bot', data.jawaban);
      if (data.session_id) {
        sintaSessionId = data.session_id;
        localStorage.setItem('sinta_session', sintaSessionId);
      }
    } else {
      tambahPesan('bot', 'Maaf, terjadi kesalahan. Silakan coba lagi.');
    }
  } catch (e) {
    hapusTyping();
    tambahPesan('bot', 'Maaf, koneksi bermasalah. Silakan coba lagi.');
  }
}

function kirimCepat(teks) {
  document.getElementById('sinta-input').value = teks;
  kirimPesan();
}

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}

// CSS animasi typing
const style = document.createElement('style');
style.textContent = '@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}';
document.head.appendChild(style);
</script>
